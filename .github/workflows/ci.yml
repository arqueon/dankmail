name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: core/go.mod
          cache-dependency-path: core/go.sum
      - name: Build
        run: make -C core build
      - name: Vet
        run: make -C core vet
      - name: Test (includes check-i18n)
        run: make -C core test
